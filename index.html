<!DOCTYPE html>
<html lang="sv" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Backa Säteri SCORE</title>
    
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&family=Lexend:wght@600;700;800&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              "colors": {
                      "inverse-primary": "#93d5a6",
                      "on-secondary-container": "#626567",
                      "inverse-on-surface": "#ecf1ff",
                      "surface-variant": "#d8e3fb",
                      "secondary-fixed": "#e0e3e5",
                      "on-primary-fixed": "#00210f",
                      "on-primary-fixed-variant": "#0a522e",
                      "on-secondary": "#ffffff",
                      "tertiary": "#735c00",
                      "tertiary-fixed": "#ffe088",
                      "on-secondary-fixed": "#191c1e",
                      "on-surface-variant": "#404941",
                      "surface-container-low": "#f0f3ff",
                      "secondary": "#5c5f61",
                      "on-surface": "#111c2d",
                      "on-tertiary-container": "#4f3d00",
                      "surface-container-highest": "#d8e3fb",
                      "tertiary-fixed-dim": "#e9c349",
                      "surface-bright": "#f9f9ff",
                      "primary-fixed": "#aef2c1",
                      "surface-tint": "#2a6a44",
                      "on-primary": "#ffffff",
                      "tertiary-container": "#cca730",
                      "surface-container-high": "#dee8ff",
                      "outline-variant": "#c0c9bf",
                      "on-error-container": "#93000a",
                      "outline": "#707971",
                      "surface": "#f9f9ff",
                      "inverse-surface": "#263143",
                      "on-background": "#111c2d",
                      "primary": "#00391d",
                      "error": "#ba1a1a",
                      "on-primary-container": "#82c496",
                      "primary-fixed-dim": "#93d5a6",
                      "surface-container": "#e7eeff",
                      "on-tertiary-fixed": "#241a00",
                      "on-tertiary": "#ffffff",
                      "surface-container-lowest": "#ffffff",
                      "on-secondary-fixed-variant": "#444749",
                      "on-tertiary-fixed-variant": "#574500",
                      "background": "#f9f9ff",
                      "secondary-container": "#e0e3e5",
                      "on-error": "#ffffff",
                      "secondary-fixed-dim": "#c4c7c9",
                      "error-container": "#ffdad6",
                      "surface-dim": "#cfdaf2",
                      "primary-container": "#0b522e"
              },
              "borderRadius": {
                      "DEFAULT": "0.25rem",
                      "lg": "0.5rem",
                      "xl": "0.75rem",
                      "full": "9999px"
              },
              "spacing": {
                      "touch-target-min": "44px",
                      "card-padding": "1rem",
                      "touch-target-standard": "56px",
                      "gutter": "1rem",
                      "stack-md": "1rem",
                      "stack-sm": "0.5rem",
                      "margin-mobile": "1.25rem"
              },
              "fontFamily": {
                      "body-lg": ["Hanken Grotesk", "sans-serif"],
                      "headline-lg": ["Lexend", "sans-serif"],
                      "body-md": ["Hanken Grotesk", "sans-serif"],
                      "score-display": ["Lexend", "sans-serif"],
                      "headline-md": ["Lexend", "sans-serif"],
                      "label-sm": ["Hanken Grotesk", "sans-serif"],
                      "label-bold": ["Lexend", "sans-serif"]
              },
              "fontSize": {
                      "body-lg": ["18px", {"lineHeight": "26px", "fontWeight": "500"}],
                      "headline-lg": ["30px", {"lineHeight": "36px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                      "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                      "score-display": ["48px", {"lineHeight": "48px", "letterSpacing": "-0.04em", "fontWeight": "800"}],
                      "headline-md": ["24px", {"lineHeight": "30px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                      "label-sm": ["12px", {"lineHeight": "16px", "fontWeight": "600"}],
                      "label-bold": ["14px", {"lineHeight": "20px", "fontWeight": "600"}]
              }
            }
          }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .shadow-soft {
                box-shadow: 0 4px 20px rgba(11, 82, 46, 0.08);
            }
            .hide-scrollbar::-webkit-scrollbar { display: none; }
            .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        }
    </style>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-background text-on-background font-body-md min-h-screen flex flex-col max-w-2xl mx-auto shadow-2xl relative">
    
    <div id="app" class="flex-grow flex flex-col relative overflow-x-hidden">

        <!-- TopAppBar (Generic for Start, History, Slope views) -->
        <header id="generic-header" class="flex justify-between items-center z-40 relative px-margin-mobile pt-4 pb-2 bg-surface shadow-sm shadow-primary/10">
            <h1 id="header-title" class="font-headline-md text-headline-md text-primary font-bold">Backa Säteri</h1>
            <div class="flex items-center gap-2">
                <button id="btn-slope-toggle" class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full bg-surface-container-low text-on-surface hover:bg-surface-variant transition-colors">
                    <span class="material-symbols-outlined">table_chart</span>
                </button>
                <button id="btn-history-toggle" class="w-touch-target-min h-touch-target-min flex items-center justify-center rounded-full bg-surface-container-low text-on-surface hover:bg-surface-variant transition-colors">
                    <span class="material-symbols-outlined">history</span>
                </button>
            </div>
        </header>

        <main class="flex-grow flex flex-col pt-4 px-margin-mobile pb-24 gap-stack-md relative overflow-y-auto hide-scrollbar">
            
            <!-- VIEW START -->
            <section id="view-start" class="view flex-col gap-4">
                <div class="bg-surface-container-lowest rounded-xl shadow-lg shadow-primary/5 p-card-padding">
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-4">Ny Runda</h2>
                    <h3 class="font-label-bold text-label-bold text-on-surface-variant mb-2 uppercase tracking-wide">Spelare</h3>
                    <ul id="setup-players-list" class="flex flex-col gap-2 mb-4">
                        <!-- Players injected here -->
                    </ul>
                    <div class="flex gap-2 mb-4">
                        <input type="text" id="input-player-name" placeholder="Namn" class="flex-1 min-w-0 bg-surface-container rounded-lg px-3 py-2 text-on-surface border-none focus:ring-2 focus:ring-primary outline-none placeholder:text-on-surface-variant/50">
                        <input type="number" id="input-player-shcp" placeholder="SHCP" class="w-20 bg-surface-container rounded-lg px-3 py-2 text-on-surface border-none focus:ring-2 focus:ring-primary outline-none placeholder:text-on-surface-variant/50">
                        <button id="btn-add-player" class="bg-secondary text-on-secondary rounded-lg px-3 py-2 font-label-bold hover:bg-secondary-fixed-dim transition-colors flex items-center justify-center">
                            <span class="material-symbols-outlined">add</span>
                        </button>
                    </div>
                    <button id="btn-start-round" class="w-full bg-primary text-on-primary font-label-bold text-label-bold h-touch-target-standard rounded-full shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all duration-200 mt-4 disabled:opacity-50">Starta Runda</button>
                </div>
            </section>

            <!-- VIEW SLOPE -->
            <section id="view-slope" class="view flex-col gap-4">
                <div class="bg-surface-container-lowest rounded-xl shadow-lg shadow-primary/5 p-card-padding">
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-4">Slopetabell</h2>
                    <img src="images/slopetabell.png" alt="Slopetabell" class="w-full rounded-lg border border-outline-variant">
                    <button id="btn-back-from-slope" class="mt-4 bg-secondary text-on-secondary rounded-lg px-4 py-2 font-label-bold w-full hover:bg-secondary-fixed-dim transition-colors h-touch-target-min">Tillbaka</button>
                </div>
            </section>

            <!-- VIEW HOLE -->
            <section id="view-hole" class="view flex-col gap-4">
                <!-- Hole Navigation & Overview Card -->
                <div class="bg-surface-container-lowest rounded-xl shadow-lg shadow-primary/5 p-card-padding z-10 relative flex flex-col gap-4">
                    <!-- Hole Selector / Swipe Area -->
                    <div class="flex justify-between items-center border-b border-outline-variant pb-4">
                        <button id="btn-prev-hole" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-touch-target-min h-touch-target-min active:scale-90">
                            <span class="material-symbols-outlined text-2xl">chevron_left</span>
                        </button>
                        <div class="text-center flex flex-col items-center">
                            <span class="font-label-sm text-label-sm text-primary uppercase tracking-widest mb-1">Backa Säteri</span>
                            <h2 id="current-hole-number" class="font-headline-lg text-headline-lg text-on-surface">Hole 1</h2>
                        </div>
                        <button id="btn-next-hole" class="text-on-surface-variant hover:text-primary transition-colors flex items-center justify-center w-touch-target-min h-touch-target-min active:scale-90">
                            <span class="material-symbols-outlined text-2xl">chevron_right</span>
                        </button>
                    </div>
                    
                    <!-- Hole Details -->
                    <div class="flex justify-around items-center pt-2">
                        <div class="text-center">
                            <p class="font-label-sm text-label-sm text-on-surface-variant">PAR</p>
                            <p id="current-hole-par" class="font-headline-md text-headline-md text-on-surface">4</p>
                        </div>
                        <div class="h-8 w-px bg-outline-variant"></div>
                        <div class="text-center">
                            <p class="font-label-sm text-label-sm text-on-surface-variant flex items-center gap-1 justify-center">
                                <span class="w-2 h-2 rounded-full bg-primary-container inline-block"></span> HDCP
                            </p>
                            <p id="current-hole-index" class="font-headline-md text-headline-md text-on-surface">3</p>
                        </div>
                    </div>
                </div>

                <!-- Mini-Map / Yardage Visual (Bento Style) -->
                <div class="h-48 rounded-xl overflow-hidden relative shadow-md shadow-primary/5 z-0 bg-surface-container-low border border-outline-variant">
                    <div id="hole-image-wrapper" class="w-full h-full relative">
                        <img id="current-hole-img" src="images/hal-1.png" alt="Banguide" class="w-full h-full object-cover opacity-80" />
                    </div>
                    <div id="hole-map-wrapper" class="w-full h-full relative hidden">
                        <div id="map" class="w-full h-full z-0"></div>
                        <div class="absolute bottom-2 left-1/2 -translate-x-1/2 z-[1000] flex gap-2 w-11/12">
                            <button id="btn-fetch-gps" class="flex-1 bg-surface-container-lowest/90 backdrop-blur-sm text-on-surface text-xs font-label-bold py-2 rounded-lg border border-outline-variant/50 shadow-sm flex items-center justify-center gap-1">📍 Hämta</button>
                            <button id="btn-save-gps" class="flex-1 bg-primary text-on-primary text-xs font-label-bold py-2 rounded-lg shadow-md shadow-primary/20 flex items-center justify-center gap-1">💾 Spara</button>
                        </div>
                    </div>

                    <!-- Overlay Toggles -->
                    <div class="absolute top-2 right-2 flex gap-1 bg-surface-container-lowest/80 backdrop-blur-sm p-1 rounded-lg border border-outline-variant/50 z-10">
                        <button id="btn-show-image" class="px-2 py-1 text-xs font-label-bold rounded bg-primary text-on-primary">Banguide</button>
                        <button id="btn-show-map" class="px-2 py-1 text-xs font-label-bold rounded text-on-surface hover:bg-surface-variant transition-colors">Karta</button>
                    </div>
                </div>

                <!-- Scorecard Grid Preview (Horizontal Scroll) -->
                <div class="mt-2 mb-2">
                    <h4 class="font-label-bold text-label-bold text-on-surface-variant mb-2 uppercase tracking-wide">Rond Score</h4>
                    <div id="scorecard-mini-grid" class="flex overflow-x-auto pb-4 gap-2 snap-x hide-scrollbar">
                        <!-- Mini grid injected here -->
                    </div>
                </div>

                <!-- Players Scoring Area -->
                <div id="scoring-players-list" class="flex flex-col gap-6 z-10 relative">
                    <!-- Player scoring cards injected here -->
                </div>

                <div class="mt-4 flex justify-center pb-8">
                    <button id="btn-finish-round" class="hidden bg-primary text-on-primary font-label-bold text-label-bold h-touch-target-standard px-8 rounded-full shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all duration-200 flex items-center gap-2 w-full justify-center">
                        <span class="material-symbols-outlined">done_all</span> Avsluta Runda
                    </button>
                </div>
            </section>

            <!-- VIEW SCORECARD (ROUND SUMMARY) -->
            <section id="view-scorecard" class="view flex-col gap-4">
                <div class="flex justify-between items-end mb-2">
                    <div>
                        <p class="font-label-sm text-label-sm text-secondary uppercase tracking-widest mb-1">Round Summary</p>
                        <h2 class="font-headline-lg text-headline-lg text-on-surface">Final Score</h2>
                    </div>
                </div>
                
                <div id="scorecard-summaries" class="flex flex-col gap-8">
                    <!-- Summaries injected here -->
                </div>

                <div class="mt-8 flex flex-col gap-4 pb-8">
                    <button id="btn-save-round" class="bg-primary text-on-primary font-label-bold text-label-bold h-touch-target-standard px-8 rounded-full shadow-lg shadow-primary/20 hover:bg-primary-container active:scale-95 transition-all duration-200 flex items-center gap-2 w-full justify-center">
                        <span class="material-symbols-outlined">save</span> Spara Runda
                    </button>
                    <button id="btn-discard-round" class="bg-transparent text-error font-label-bold text-label-bold py-2 w-full text-center hover:underline h-touch-target-min">
                        Kasta Runda
                    </button>
                </div>
            </section>

            <!-- VIEW HISTORY -->
            <section id="view-history" class="view flex-col gap-4">
                <div class="bg-surface-container-lowest rounded-xl shadow-lg shadow-primary/5 p-card-padding">
                    <h2 class="font-headline-md text-headline-md text-on-surface mb-4">Historik</h2>
                    <ul id="history-list" class="flex flex-col gap-4">
                        <!-- History injected here -->
                    </ul>
                    <button id="btn-back-to-start" class="mt-4 bg-secondary text-on-secondary rounded-lg px-4 py-2 font-label-bold w-full hover:bg-secondary-fixed-dim transition-colors h-touch-target-min">Tillbaka</button>
                </div>
            </section>

        </main>
    </div>

    <!-- Scripts -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="js/db.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
